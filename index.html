<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickShop</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --yellow: #facc15;
      --bg: #f4f3ff;
      --white: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --card-shadow: 0 2px 12px rgba(124,58,237,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--purple);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .logo span { color: var(--yellow); }

    /* ── SEARCH BAR ── */
    #search-input {
      flex: 1;
      max-width: 400px;
      padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--purple); }

    /* ── CATEGORY TABS ── */
    .categories {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      overflow-x: auto;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .categories::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 7px 18px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--white);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      color: var(--text);
    }
    .cat-btn:hover { border-color: var(--purple); color: var(--purple); }
    .cat-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    /* ── PRODUCT GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    /* ── PRODUCT CARD ── */
    .card {
      background: var(--white);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(124,58,237,0.14);
    }

    .card-img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      padding: 16px;
      background: #fafafa;
    }

    .card-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--purple);
    }

    .card-rating {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-rating .star { color: #f59e0b; }

    .add-btn {
      margin-top: auto;
      padding: 9px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .add-btn:hover { background: #5b21b6; }

    /* ── LOADING / EMPTY STATE ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }
    .no-results h3 { font-size: 1.3rem; color: var(--text); margin-bottom: 8px; }
    .no-results p { color: var(--muted); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>⚡</span> QuickShop</div>
  <input type="text" id="search-input" placeholder="Search products..." />
</header>

<!-- CATEGORY TABS -->
<div class="categories" id="categories">
  <button class="cat-btn active" data-cat="all">All</button>
  <!-- more buttons added by JS -->
</div>

<!-- PRODUCT GRID -->
<div class="grid" id="product-grid">
  <div class="state-msg">Loading products...</div>
</div>

<script>
  // ── STATE ──
  let allProducts = [];       // all products from API
  let activeCategory = 'all'; // currently selected category
  let searchText = '';        // current search query

  // ── FETCH PRODUCTS FROM FAKESTOREAPI ──
  async function fetchProducts() {
    try {
      const response = await fetch('https://fakestoreapi.com/products');
      allProducts = await response.json();
      buildCategoryButtons();
      renderProducts();
    } catch (error) {
      document.getElementById('product-grid').innerHTML =
        '<div class="state-msg">Failed to load products. Please check your internet connection.</div>';
    }
  }

  // ── BUILD CATEGORY BUTTONS ──
  function buildCategoryButtons() {
    // Get unique categories from the products
    const categories = ['all', ...new Set(allProducts.map(p => p.category))];

    const container = document.getElementById('categories');
    container.innerHTML = ''; // clear old buttons

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
      btn.textContent = formatCategoryName(cat);
      btn.dataset.cat = cat;

      // When a category button is clicked:
      btn.addEventListener('click', () => {
        activeCategory = cat;
        // Update active class on all buttons
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(); // show filtered products
      });

      container.appendChild(btn);
    });
  }

  // ── FORMAT CATEGORY NAMES (capitalize each word) ──
  function formatCategoryName(cat) {
    return cat.replace(/\b\w/g, c => c.toUpperCase());
  }

  // ── RENDER (FILTER + DISPLAY) PRODUCTS ──
  function renderProducts() {
    const grid = document.getElementById('product-grid');

    // STEP 1: Filter by category
    let filtered = allProducts;
    if (activeCategory !== 'all') {
      filtered = allProducts.filter(p => p.category === activeCategory);
    }

    // STEP 2: Filter by search text (check title)
    if (searchText.trim() !== '') {
      const query = searchText.toLowerCase();
      filtered = filtered.filter(p =>
        p.title.toLowerCase().includes(query)
      );
    }

    // STEP 3: Show message if nothing found
    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="no-results">
          <h3>No products found</h3>
          <p>Try a different search term or category.</p>
        </div>`;
      return;
    }

    // STEP 4: Build HTML for each product card
    grid.innerHTML = filtered.map(product => `
      <div class="card">
        <img class="card-img" src="${product.image}" alt="${product.title}" loading="lazy" />
        <div class="card-body">
          <div class="card-title">${product.title}</div>
          <div class="card-price">$${product.price.toFixed(2)}</div>
          <div class="card-rating">
            <span class="star">★</span>
            ${product.rating.rate} (${product.rating.count})
          </div>
          <button class="add-btn">Add</button>
        </div>
      </div>
    `).join('');
  }

  // ── SEARCH INPUT LISTENER ──
  // Every time the user types, update searchText and re-render
  document.getElementById('search-input').addEventListener('input', function () {
    searchText = this.value;
    renderProducts();
  });

  // ── START ──
  fetchProducts();
</script>

</body>
</html>
