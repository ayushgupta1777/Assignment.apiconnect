<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickShop</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7c3aed;--purple-dark:#5b21b6;--purple-light:#ede9fe;
  --yellow:#facc15;--green:#16a34a;--red:#dc2626;
  --bg:#f4f3ff;--white:#fff;--text:#1a1a2e;--muted:#6b7280;
  --border:#e5e7eb;--shadow:0 2px 16px rgba(124,58,237,0.10);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{background:var(--white);border-bottom:2px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--purple);display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
.logo span{color:var(--yellow)}
#search-input{flex:1;max-width:380px;padding:9px 16px;border:2px solid var(--border);border-radius:10px;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color .2s}
#search-input:focus{border-color:var(--purple)}
.cart-btn{margin-left:auto;position:relative;background:var(--purple);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .2s}
.cart-btn:hover{background:var(--purple-dark)}
.cart-badge{background:var(--yellow);color:var(--text);border-radius:999px;padding:1px 7px;font-size:0.78rem;font-weight:700;min-width:20px;text-align:center}

/* CATEGORIES */
.categories{display:flex;gap:10px;padding:14px 24px;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--border)}
.categories::-webkit-scrollbar{display:none}
.cat-btn{padding:6px 18px;border-radius:999px;border:2px solid var(--border);background:var(--white);font-family:inherit;font-size:0.83rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .18s;color:var(--text)}
.cat-btn:hover{border-color:var(--purple);color:var(--purple)}
.cat-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:18px;padding:24px}

/* CARD */
.card{background:var(--white);border-radius:14px;border:1.5px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(124,58,237,0.15)}
.card-img{width:100%;height:170px;object-fit:contain;padding:14px;background:#fafafa}
.card-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:5px;flex:1}
.card-title{font-size:0.82rem;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-price{font-size:1rem;font-weight:700;color:var(--purple)}
.card-rating{font-size:0.75rem;color:var(--muted);display:flex;align-items:center;gap:3px}
.star{color:#f59e0b}
.add-btn{margin-top:auto;padding:8px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;transition:background .18s}
.add-btn:hover{background:var(--purple-dark)}
.state-msg{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:1.1rem}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px}
.no-results h3{font-size:1.3rem;margin-bottom:8px}
.no-results p{color:var(--muted)}

/* DETAIL OVERLAY */
#detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#detail-overlay.open{display:flex}
.detail-box{background:var(--white);border-radius:20px;max-width:820px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.detail-header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border)}
.detail-header h2{font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--purple)}
.close-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1}
.close-btn:hover{color:var(--red)}
.detail-body{display:flex;flex-wrap:wrap}
.detail-img-wrap{flex:1;min-width:240px;padding:30px;background:#fafafa;display:flex;align-items:center;justify-content:center}
.detail-img{max-width:200px;max-height:260px;object-fit:contain}
.detail-info{flex:1.4;min-width:240px;padding:28px;display:flex;flex-direction:column;gap:14px}
.detail-category{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--purple);background:var(--purple-light);padding:3px 10px;border-radius:999px;width:fit-content}
.detail-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.4}
.detail-price{font-size:1.8rem;font-weight:800;color:var(--purple)}
.detail-rating{display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--muted)}
.detail-desc{font-size:0.88rem;line-height:1.7;color:#374151}
.detail-divider{border:none;border-top:1px solid var(--border)}
.qty-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.qty-label{font-size:0.85rem;font-weight:600}
.qty-ctrl{display:flex;align-items:center;border:2px solid var(--border);border-radius:10px;overflow:hidden}
.qty-ctrl button{background:var(--white);border:none;padding:8px 14px;font-size:1rem;cursor:pointer;font-family:inherit;font-weight:700;transition:background .15s}
.qty-ctrl button:hover{background:var(--purple-light);color:var(--purple)}
.qty-ctrl span{padding:8px 16px;font-weight:700;font-size:0.95rem;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.detail-add-btn{padding:13px 28px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s,transform .15s}
.detail-add-btn:hover{background:var(--purple-dark);transform:scale(1.03)}
.detail-added{background:var(--green) !important}

/* CART SIDEBAR */
#cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:400;display:none}
#cart-overlay.open{display:block}
#cart-sidebar{position:fixed;top:0;right:-420px;width:400px;max-width:95vw;height:100%;background:var(--white);box-shadow:-4px 0 30px rgba(0,0,0,0.15);z-index:401;display:flex;flex-direction:column;transition:right .3s ease}
#cart-sidebar.open{right:0}
.cart-head{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:2px solid var(--border)}
.cart-head h2{font-family:'Syne',sans-serif;font-size:1.2rem}
.cart-items{flex:1;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:14px}
.cart-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
.cart-empty .big-icon{font-size:3.5rem}

/* CART ITEM ROW */
.ci{display:flex;gap:12px;align-items:flex-start;padding:12px;border:1.5px solid var(--border);border-radius:12px;background:#fafafa}
.ci-img{width:64px;height:64px;object-fit:contain;background:var(--white);border-radius:8px;padding:4px;flex-shrink:0}
.ci-info{flex:1;display:flex;flex-direction:column;gap:4px}
.ci-name{font-size:0.8rem;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ci-price{font-size:0.9rem;font-weight:700;color:var(--purple)}
.ci-actions{display:flex;align-items:center;gap:8px;margin-top:4px}
.ci-qty{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.ci-qty button{background:var(--white);border:none;padding:4px 10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:background .15s}
.ci-qty button:hover{background:var(--purple-light);color:var(--purple)}
.ci-qty span{padding:4px 10px;font-size:0.85rem;font-weight:700;border-left:1px solid var(--border);border-right:1px solid var(--border)}
.ci-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:2px 6px;border-radius:6px;transition:all .15s}
.ci-remove:hover{background:#fee2e2;color:var(--red)}

/* CART FOOTER */
.cart-footer{border-top:2px solid var(--border);padding:20px 22px;display:flex;flex-direction:column;gap:12px}
.cart-total-row{display:flex;justify-content:space-between;align-items:center}
.cart-total-label{font-size:0.9rem;color:var(--muted)}
.cart-total-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--purple)}
.checkout-btn{padding:14px;background:var(--purple);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.checkout-btn:hover{background:var(--purple-dark)}
.clear-btn{padding:10px;background:none;color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all .18s}
.clear-btn:hover{border-color:var(--red);color:var(--red);background:#fff1f1}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:0.9rem;font-weight:500;z-index:999;opacity:0;transition:all .35s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo" onclick="goHome()"><span>⚡</span> QuickShop</div>
  <input type="text" id="search-input" placeholder="Search products…"/>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart <span class="cart-badge" id="cart-count">0</span>
  </button>
</header>

<!-- CATEGORIES -->
<div class="categories" id="categories"></div>

<!-- PRODUCT GRID -->
<div class="grid" id="product-grid">
  <div class="state-msg">⏳ Loading products…</div>
</div>

<!-- PRODUCT DETAIL OVERLAY -->
<div id="detail-overlay" onclick="closeDetailOutside(event)">
  <div class="detail-box" id="detail-box">
    <div class="detail-header">
      <h2>⚡ Product Detail</h2>
      <button class="close-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-img-wrap">
        <img class="detail-img" id="d-img" src="" alt=""/>
      </div>
      <div class="detail-info">
        <div class="detail-category" id="d-cat"></div>
        <div class="detail-title" id="d-title"></div>
        <div class="detail-price" id="d-price"></div>
        <div class="detail-rating" id="d-rating"></div>
        <hr class="detail-divider"/>
        <div class="detail-desc" id="d-desc"></div>
        <hr class="detail-divider"/>
        <div class="qty-row">
          <span class="qty-label">Qty:</span>
          <div class="qty-ctrl">
            <button onclick="changeDetailQty(-1)">−</button>
            <span id="detail-qty">1</span>
            <button onclick="changeDetailQty(1)">+</button>
          </div>
        </div>
        <button class="detail-add-btn" id="detail-add-btn" onclick="addFromDetail()">🛒 Add to Cart</button>
      </div>
    </div>
  </div>
</div>

<!-- CART SIDEBAR OVERLAY (dark background) -->
<div id="cart-overlay" onclick="closeCart()"></div>

<!-- CART SIDEBAR -->
<div id="cart-sidebar">
  <div class="cart-head">
    <h2>🛒 Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cart-total">$0.00</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">⚡ Checkout</button>
    <button class="clear-btn" onclick="clearCart()">🗑 Clear Cart</button>
  </div>
</div>

<!-- TOAST POPUP -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────
//  STATE — our "memory" variables
// ─────────────────────────────────────────
let allProducts    = [];      // all products from API
let activeCategory = 'all';  // which category tab is selected
let searchText     = '';      // what user typed in search
let cart           = [];      // [{product, qty}, ...]
let currentProduct = null;   // product open in detail view
let detailQty      = 1;       // qty chosen in detail view

// ─────────────────────────────────────────
//  1. FETCH from API
// ─────────────────────────────────────────
async function fetchProducts() {
  try {
    const res = await fetch('https://fakestoreapi.com/products');
    allProducts = await res.json();
    buildCategories();
    renderGrid();
  } catch (e) {
    document.getElementById('product-grid').innerHTML =
      '<div class="state-msg">Failed to load. Check your internet.</div>';
  }
}

// ─────────────────────────────────────────
//  2. BUILD CATEGORY BUTTONS
// ─────────────────────────────────────────
function buildCategories() {
  const cats = ['all', ...new Set(allProducts.map(p => p.category))];
  const wrap = document.getElementById('categories');
  wrap.innerHTML = '';
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
    btn.textContent = fmt(cat);
    btn.onclick = () => {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    wrap.appendChild(btn);
  });
}

function fmt(s) { return s.replace(/\b\w/g, c => c.toUpperCase()); }

// ─────────────────────────────────────────
//  3. RENDER PRODUCT GRID
// ─────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('product-grid');
  let list = allProducts;

  if (activeCategory !== 'all')
    list = list.filter(p => p.category === activeCategory);

  if (searchText.trim())
    list = list.filter(p => p.title.toLowerCase().includes(searchText.toLowerCase()));

  if (list.length === 0) {
    grid.innerHTML = `<div class="no-results"><h3>No products found</h3><p>Try a different search or category.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(p => `
    <div class="card" onclick="openDetail(${p.id})">
      <img class="card-img" src="${p.image}" alt="${p.title}" loading="lazy"/>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-price">$${p.price.toFixed(2)}</div>
        <div class="card-rating"><span class="star">★</span> ${p.rating.rate} (${p.rating.count})</div>
        <button class="add-btn" onclick="event.stopPropagation(); quickAdd(${p.id})">+ Add to Cart</button>
      </div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────
//  4. PRODUCT DETAIL — open / close
// ─────────────────────────────────────────
function openDetail(id) {
  currentProduct = allProducts.find(p => p.id === id);
  if (!currentProduct) return;
  detailQty = 1;

  document.getElementById('d-img').src             = currentProduct.image;
  document.getElementById('d-cat').textContent      = fmt(currentProduct.category);
  document.getElementById('d-title').textContent    = currentProduct.title;
  document.getElementById('d-price').textContent    = '$' + currentProduct.price.toFixed(2);
  document.getElementById('d-rating').innerHTML     =
    `<span class="star">★★★★★</span>&nbsp;${currentProduct.rating.rate}/5 &nbsp;·&nbsp; ${currentProduct.rating.count} reviews`;
  document.getElementById('d-desc').textContent     = currentProduct.description;
  document.getElementById('detail-qty').textContent = 1;

  const btn = document.getElementById('detail-add-btn');
  btn.textContent = '🛒 Add to Cart';
  btn.classList.remove('detail-added');

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentProduct = null;
}

function closeDetailOutside(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetail();
}

// Change qty in detail view
function changeDetailQty(delta) {
  detailQty = Math.max(1, detailQty + delta);
  document.getElementById('detail-qty').textContent = detailQty;
}

// Add to cart from detail page
function addFromDetail() {
  if (!currentProduct) return;
  addToCart(currentProduct, detailQty);
  const btn = document.getElementById('detail-add-btn');
  btn.textContent = '✅ Added!';
  btn.classList.add('detail-added');
  setTimeout(() => {
    btn.textContent = '🛒 Add to Cart';
    btn.classList.remove('detail-added');
  }, 1800);
}

// ─────────────────────────────────────────
//  5. CART LOGIC
// ─────────────────────────────────────────

// Quick add from grid card (qty = 1)
function quickAdd(id) {
  const product = allProducts.find(p => p.id === id);
  if (product) addToCart(product, 1);
}

// Core add function — used by both quick add and detail page
function addToCart(product, qty) {
  const existing = cart.find(ci => ci.product.id === product.id);
  if (existing) {
    existing.qty += qty;          // already in cart → increase qty
  } else {
    cart.push({ product, qty }); // new → add it
  }
  updateCartUI();
  showToast('✅ Added: ' + product.title.slice(0, 28) + '…');
}

// Change qty of item already in cart
function changeCartQty(id, delta) {
  const item = cart.find(ci => ci.product.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id); // remove if reaches 0
  else updateCartUI();
}

// Remove one item from cart
function removeFromCart(id) {
  cart = cart.filter(ci => ci.product.id !== id);
  updateCartUI();
}

// Remove ALL items from cart
function clearCart() {
  if (!confirm('Clear your entire cart?')) return;
  cart = [];
  updateCartUI();
}

// ─────────────────────────────────────────
//  6. UPDATE CART UI (badge + sidebar)
// ─────────────────────────────────────────
function updateCartUI() {
  // total number of items (counting qty)
  const totalItems = cart.reduce((sum, ci) => sum + ci.qty, 0);
  document.getElementById('cart-count').textContent = totalItems;

  const container = document.getElementById('cart-items');
  const footer    = document.getElementById('cart-footer');

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="cart-empty">
        <div class="big-icon">🛒</div>
        <p>Your cart is empty</p>
        <p style="font-size:0.82rem">Go add some products!</p>
      </div>`;
    footer.style.display = 'none';
    return;
  }

  // Build each cart row
  container.innerHTML = cart.map(ci => `
    <div class="ci">
      <img class="ci-img" src="${ci.product.image}" alt="${ci.product.title}"/>
      <div class="ci-info">
        <div class="ci-name">${ci.product.title}</div>
        <div class="ci-price">$${(ci.product.price * ci.qty).toFixed(2)}</div>
        <div class="ci-actions">
          <div class="ci-qty">
            <button onclick="changeCartQty(${ci.product.id}, -1)">−</button>
            <span>${ci.qty}</span>
            <button onclick="changeCartQty(${ci.product.id}, 1)">+</button>
          </div>
          <button class="ci-remove" onclick="removeFromCart(${ci.product.id})" title="Remove">🗑</button>
        </div>
      </div>
    </div>
  `).join('');

  // Total price
  const total = cart.reduce((sum, ci) => sum + ci.product.price * ci.qty, 0);
  document.getElementById('cart-total').textContent = '$' + total.toFixed(2);
  footer.style.display = 'flex';
}

// ─────────────────────────────────────────
//  7. OPEN / CLOSE CART SIDEBAR
// ─────────────────────────────────────────
function openCart() {
  document.getElementById('cart-sidebar').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cart-sidebar').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ─────────────────────────────────────────
//  8. CHECKOUT
// ─────────────────────────────────────────
function checkout() {
  const total = cart.reduce((sum, ci) => sum + ci.product.price * ci.qty, 0);
  const items = cart.reduce((sum, ci) => sum + ci.qty, 0);
  alert(`🎉 Order placed!\n\nItems: ${items}\nTotal: $${total.toFixed(2)}\n\nThank you for shopping at QuickShop!`);
  cart = [];
  updateCartUI();
  closeCart();
}

// ─────────────────────────────────────────
//  9. TOAST NOTIFICATION
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────
//  10. SEARCH
// ─────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  searchText = this.value;
  renderGrid();
});

// Click logo → reset everything
function goHome() {
  activeCategory = 'all';
  searchText = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.cat-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
  renderGrid();
}

// ─────────────────────────────────────────
//  START
// ─────────────────────────────────────────
fetchProducts();
updateCartUI();
</script>
</body>
</html>
